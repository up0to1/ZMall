
worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/json;

    sendfile        on;
    
    keepalive_timeout  65;

     server {
        listen       80;
        server_name  localhost;
        # 指定前端项目所在的位置
        location / {
            root html;
        }
        # 上传文件静态资源（本地存储模式）
        location /uploads/ {
            root html;
            expires 7d;
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }
    server {
        listen       18080;
        server_name  localhost;
        # 指定前端项目所在的位置
        location / {
            root html/zmall-portal;
            # HTML和JS文件禁止缓存，确保浏览器总是加载最新版本
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }
        # 上传文件静态资源（本地存储模式）
        location /uploads/ {
            root html;
            expires 7d;
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
        location /api {
            rewrite /api/(.*)  /$1 break;
            proxy_pass http://localhost:8080;
        }
    }
    server {
        listen       18081;
        server_name  localhost;
        # 指定前端项目所在的位置
        location / {
            root html/zmall-admin;
        }
        # 上传文件静态资源（本地存储模式）
        location /uploads/ {
            root html;
            expires 7d;
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
        location /api {
            rewrite /api/(.*)  /$1 break;
            proxy_pass http://localhost:8080;
        }
    }
    server {
        listen       18082;
        server_name  localhost;

        # 静态资源不需要鉴权
        location /css/ { root html/zm-refresh-admin; add_header Cache-Control "no-cache, no-store, must-revalidate"; }
        location /js/ { root html/zm-refresh-admin; add_header Cache-Control "no-cache, no-store, must-revalidate"; }
        location /img/ { root html/zm-refresh-admin; }
        location /fonts/ { root html/zm-refresh-admin; }
        # 上传文件静态资源（本地存储模式）
        location /uploads/ {
            root html;
            expires 7d;
        }

        # 登录页不需要鉴权
        location = /login.html {
            root html/zm-refresh-admin;
        }

        # 其他页面
        location / {
            root html/zm-refresh-admin;
            index index.html;
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
        location /api {
             proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Real-PORT $remote_port;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            rewrite /api/(.*)  /$1 break;
            proxy_pass http://localhost:8080;
        }
    }
    # upstream backend {
    #     server 127.0.0.1:8081 max_fails=5 fail_timeout=10s weight=1;
    #     server 127.0.0.1:8082 max_fails=5 fail_timeout=10s weight=1;
    # }  
}
