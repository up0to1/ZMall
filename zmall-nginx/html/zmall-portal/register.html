<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=9; IE=8; IE=7; IE=EDGE">
  <meta http-equiv="X-UA-Compatible" content="IE=EmulateIE7"/>
  <title>Michael杂货铺--注册页面</title>
  <link rel="stylesheet" type="text/css" href="./css/index.css"/>
  <link rel="stylesheet" type="text/css" href="./css/webbase.css"/>
  <link rel="stylesheet" type="text/css" href="./css/pages-login.css"/>
  <style>
    .loginArea { height: 600px !important; }
    .login { height: 600px !important; background-size: cover !important; background-position: center !important; }
    .loginform { top: 20px !important; }
    .field-error { color: #e54346; font-size: 12px; min-height: 16px; line-height: 16px; }
    .input-prepend input.field-invalid { border-color: #e54346 !important; }
    .error-msg { color: #e54346; font-size: 12px; min-height: 16px; }
    .otherlogin .register { font-size: 14px; }
    .otherlogin .register a { color: #e54346; text-decoration: none; }
  </style>
</head>

<body>
<div class="login-box" id="registerApp">
  <top></top>
  <!--head-->
  <div class="py-container logoArea">
    <div class="banner">
      <div class="logo">
        <!-- <img src="./img/logo.png" alt="1"/> -->
      </div>
    </div>
  </div>
  <!--registerArea-->
  <div class="loginArea">
    <div class="py-container login">
      <div class="loginform">
        <ul class="sui-nav nav-tabs tab-wraped">
          <li>
            <a href="#index" data-toggle="tab">
              <h3>扫描登录</h3>
            </a>
          </li>
          <li class="active">
            <a href="#profile" data-toggle="tab">
              <h3>账户注册</h3>
            </a>
          </li>
        </ul>
        <div class="tab-content tab-wraped">
          <div id="index" class="tab-pane">
            <p>二维码登录，暂为官网二维码</p>
            <img src="./img/wx_cz.jpg"/>
          </div>
          <div id="profile" class="tab-pane active">
            <form class="sui-form" @submit.prevent="register">
              <div class="input-prepend"><span class="add-on loginname"></span>
                <input type="text" placeholder="请输入用户名（2-20位）" class="span2 input-xfat"
                       :class="{'field-invalid': errors.username}"
                       v-model="form.username" @blur="validateUsername" @input="clearError('username')" autocomplete="off">
              </div>
              <div class="field-error" v-text="errors.username"></div>
              <div class="input-prepend"><span class="add-on loginpwd"></span>
                <input type="password" placeholder="请输入密码（3-20位）" class="span2 input-xfat"
                       :class="{'field-invalid': errors.password}"
                       v-model="form.password" @blur="validatePassword" @input="clearError('password')">
              </div>
              <div class="field-error" v-text="errors.password"></div>
              <div class="input-prepend"><span class="add-on loginpwd"></span>
                <input type="password" placeholder="请再次输入密码" class="span2 input-xfat"
                       :class="{'field-invalid': errors.confirmPassword}"
                       v-model="confirmPassword" @blur="validateConfirmPassword" @input="clearError('confirmPassword')">
              </div>
              <div class="field-error" v-text="errors.confirmPassword"></div>
              <div class="input-prepend"><span class="add-on loginname"></span>
                <input type="text" placeholder="手机号（选填）" class="span2 input-xfat"
                       :class="{'field-invalid': errors.phone}"
                       v-model="form.phone" @blur="validatePhone" @input="clearError('phone')" autocomplete="off">
              </div>
              <div class="field-error" v-text="errors.phone"></div>
              <div class="setting" style="margin: 8px 0;">
                <label class="checkbox inline" style="margin-right: 16px;">
                  <input type="radio" name="role" v-model="form.role" :value="1" checked> 普通用户
                </label>
                <label class="checkbox inline">
                  <input type="radio" name="role" v-model="form.role" :value="2"> 商家
                </label>
              </div>
              <div class="error-msg" v-text="msg"></div>
              <div class="logined">
                <a class="sui-btn btn-block btn-xlarge btn-danger" @click="register"
                   href="javascript:void(0)">注&nbsp;&nbsp;册</a>
              </div>
            </form>
            <div class="otherlogin">
              <div class="types">
                <ul>
                  <li><img src="./img/qq.png" width="35px" height="35px"/></li>
                  <li><img src="./img/sina.png"/></li>
                  <li><img src="./img/ali.png"/></li>
                  <li><img src="./img/weixin.png"/></li>
                </ul>
              </div>
              <span class="register">已有账号？<a href="/login.html">去登录</a></span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
<script src="./js/vue.js"></script>
<script src="./js/axios.min.js"></script>
<script src="./js/common.js"></script>
<script src="./js/top.js"></script>
<script type="text/javascript">
new Vue({
  el: "#registerApp",
  data: {
    form: {
      username: '',
      password: '',
      phone: '',
      role: 1
    },
    confirmPassword: '',
    errors: {
      username: '',
      password: '',
      confirmPassword: '',
      phone: ''
    },
    msg: '',
    loading: false
  },
  methods: {
    validateUsername() {
      if (!this.form.username) {
        this.errors.username = '请输入用户名';
        return false;
      }
      if (this.form.username.length < 2 || this.form.username.length > 20) {
        this.errors.username = '用户名长度必须在2-20之间';
        return false;
      }
      this.errors.username = '';
      return true;
    },
    validatePassword() {
      if (!this.form.password) {
        this.errors.password = '请输入密码';
        return false;
      }
      if (this.form.password.length < 3) {
        this.errors.password = '密码长度不能少于3位';
        return false;
      }
      if (this.form.password.length > 20) {
        this.errors.password = '密码长度不能超过20位';
        return false;
      }
      this.errors.password = '';
      // 如果确认密码已填写，也重新校验
      if (this.confirmPassword) this.validateConfirmPassword();
      return true;
    },
    validateConfirmPassword() {
      if (!this.confirmPassword) {
        this.errors.confirmPassword = '请再次输入密码';
        return false;
      }
      if (this.confirmPassword !== this.form.password) {
        this.errors.confirmPassword = '两次输入的密码不一致';
        return false;
      }
      this.errors.confirmPassword = '';
      return true;
    },
    validatePhone() {
      if (this.form.phone && !/^1[3-9]\d{9}$/.test(this.form.phone)) {
        this.errors.phone = '手机号格式不正确';
        return false;
      }
      this.errors.phone = '';
      return true;
    },
    clearError(field) {
      this.errors[field] = '';
      this.msg = '';
    },
    register() {
      const v1 = this.validateUsername();
      const v2 = this.validatePassword();
      const v3 = this.validateConfirmPassword();
      const v4 = this.validatePhone();
      if (!v1 || !v2 || !v3 || !v4) return;

      this.loading = true;
      this.msg = '';
      axios.post("/users/register", this.form)
        .then(({token, ... user}) => {
          localStorage.setItem("token", token);
          util.store.set("user-info", user);
          const url = util.store.get("return-url");
          window.location = url || '/';
        })
        .catch(err => {
          this.loading = false;
          const data = err.response && err.response.data;
          this.msg = (data && data.msg) || '注册失败，请稍后重试';
        });
    }
  }
});
</script>
</body>
</html>
