server:
  port: 8087
feign:
  okhttp:
    enabled: true
  sentinel:
    enabled: true

hm:
  db:
    database: hm-social
  mq:
    shop-feed:
      enabled: true
  swagger:
    title: "ZMall商家社交服务接口文档"
    package: com.hmall.social.controller
  # OSS配置（如果以下信息都填写了则使用OSS，留空则使用本地存储）
  oss:
    endpoint:
    access-key-id:
    access-key-secret:
    bucket-name:
  # 本地文件上传配置
  upload:
    base-path: ../zmall-nginx/html/uploads
    url-prefix: /uploads/

spring:
  jackson:
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB
  data:
    redis:
      database: 0